<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hand Steering Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
    }

    .game-wrap {
      position: relative;
      width: 700px;
      height: 525px;
      overflow: hidden;
    }

    canvas#game {
      display: block;
      width: 700px;
      height: 525px;
    }

    /* Webcam picture-in-picture */
    .pip {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 192px;
      height: 144px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }
    .pip video,
    .pip canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .pip-label {
      position: absolute;
      bottom: 4px;
      left: 6px;
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
    }

    /* Start overlay */
    .start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(0,0,0,0.78);
    }
    .start-overlay h1 {
      color: #fff;
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .start-overlay p { color: #888; font-size: 13px; }
    .start-overlay button {
      margin-top: 6px;
      padding: 10px 32px;
      font-size: 14px;
      font-family: monospace;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: 1px solid #666;
      background: #1a1a1a;
      color: #eee;
      text-transform: uppercase;
    }
    .start-overlay button:hover { background: #2a2a2a; }
    .start-overlay button:disabled { opacity: 0.35; cursor: default; }
    #status { font-size: 11px; color: #555; min-height: 16px; }
    #voice-status { position: absolute; bottom: 8px; left: 8px; font-size: 10px; color: rgba(0,230,140,0.55); pointer-events: none; }
  </style>
</head>
<body>
  <div class="game-wrap">
    <canvas id="game" width="700" height="525"></canvas>

    <div class="pip">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <span class="pip-label">HANDS CAM</span>
    </div>

    <span id="voice-status"></span>

    <div class="start-overlay" id="startOverlay">
      <h1>Hand Steering Racer</h1>
      <p>Hold both hands up like a steering wheel to drive</p>
      <button id="btnStart">Start</button>
      <div id="status">Click Start to begin.</div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
