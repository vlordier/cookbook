<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Steering Angle — MediaPipe Hands Spike</title>
  <style>
    body { font-family: monospace; padding: 24px; max-width: 900px; background: #111; color: #eee; margin: 0 auto; }
    h1 { font-size: 16px; margin-bottom: 16px; color: #aaa; }
    .layout { display: flex; gap: 32px; align-items: flex-start; }
    .video-wrap {
      position: relative;
      width: 480px;
      height: 360px;
      background: #1a1a1a;
      border: 1px solid #333;
      flex-shrink: 0;
    }
    .video-wrap video,
    .video-wrap canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .sidebar { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    canvas#wheel { border: 1px solid #333; background: #1a1a1a; }
    .angle { font-size: 40px; font-weight: bold; color: #fff; min-height: 48px; text-align: center; }
    .controls { display: flex; gap: 10px; margin: 16px 0; }
    button {
      padding: 7px 18px; font-size: 13px; font-family: monospace;
      cursor: pointer; border: 1px solid #888; background: #222; color: #eee;
    }
    button:disabled { opacity: 0.35; cursor: default; }
    #status { font-size: 12px; color: #888; min-height: 18px; }
  </style>
</head>
<body>
  <h1>MediaPipe Hands — Steering Angle Spike</h1>

  <div class="layout">
    <div>
      <div class="video-wrap">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="controls">
        <button id="btnStart">Start Webcam</button>
      </div>
      <div id="status">Click "Start Webcam" to begin.</div>
    </div>

    <div class="sidebar">
      <label style="font-size:12px;color:#888;">Steering angle</label>
      <canvas id="wheel" width="160" height="160"></canvas>
      <div class="angle" id="angle"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
